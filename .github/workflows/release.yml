name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: brew install create-dmg

      - name: Build release packages
        id: package
        env:
          MARKETING_VERSION_OVERRIDE: ${{ github.ref_name }}
          BUILD_NUMBER_OVERRIDE: ${{ github.run_number }}
        run: |
          marketing_version="${MARKETING_VERSION_OVERRIDE#v}"
          MARKETING_VERSION_OVERRIDE="${marketing_version}" BUILD_NUMBER_OVERRIDE="${BUILD_NUMBER_OVERRIDE}" scripts/build-release.sh Release

      - name: Generate Sparkle Appcast
        env:
          SPARKLE_EDDSA_PRIVATE_KEY: ${{ secrets.SPARKLE_EDDSA_PRIVATE_KEY }}
        run: |
          mkdir -p Sparkle-Bin appcast_work
          curl -sL https://github.com/sparkle-project/Sparkle/releases/download/2.6.4/Sparkle-2.6.4.tar.xz | tar -xJ -C Sparkle-Bin
          cp dist/*.dmg appcast_work/
          cp dist/*.html appcast_work/ 2>/dev/null || true
          echo "$SPARKLE_EDDSA_PRIVATE_KEY" | ./Sparkle-Bin/bin/generate_appcast --download-url-prefix "https://github.com/w77sh/Maa/releases/download/${{ github.ref_name }}/" --ed-key-file - appcast_work/
          cp appcast_work/appcast.xml dist/

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.dmg
            dist/appcast.xml
          overwrite_files: true
          generate_release_notes: true
          body: |
            Download the DMG file to install Maa on your Mac. You can also download the zip if preferred.
            
            Note: this package is unsigned by default, so macOS Gatekeeper may require opening once via right-click -> Open.

      - name: Update Homebrew Cask
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [ -z "$HOMEBREW_TAP_TOKEN" ]; then
            echo "HOMEBREW_TAP_TOKEN is not set. Skipping Homebrew update."
            exit 0
          fi
          
          dmg_file=$(ls dist/*.dmg | head -n 1)
          dmg_filename=$(basename "$dmg_file")
          build_number=$(echo "$dmg_filename" | cut -d'-' -f3)
          dmg_sha256=$(shasum -a 256 "$dmg_file" | awk '{print $1}')
          
          version="${{ github.ref_name }}"
          version="${version#v}"
          
          git clone https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/${{ github.repository_owner }}/homebrew-tap.git tap-repo
          cd tap-repo
          
          cask_file="Casks/maa.rb"
          sed -i '' "s/version \".*\"/version \"${version}\"/" "$cask_file"
          sed -i '' "s/sha256 \".*\"/sha256 \"${dmg_sha256}\"/" "$cask_file"
          sed -i '' "s/Maa-#{version}-[0-9]*-macOS.dmg/Maa-#{version}-${build_number}-macOS.dmg/" "$cask_file"
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$cask_file"
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update Maa to ${version}"
            git push
          fi
