name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: brew install create-dmg

      - name: Build release packages
        id: package
        env:
          MARKETING_VERSION_OVERRIDE: ${{ github.ref_name }}
          BUILD_NUMBER_OVERRIDE: ${{ github.run_number }}
        run: |
          marketing_version="${MARKETING_VERSION_OVERRIDE#v}"
          MARKETING_VERSION_OVERRIDE="${marketing_version}" BUILD_NUMBER_OVERRIDE="${BUILD_NUMBER_OVERRIDE}" scripts/build-release.sh Release

      - name: Generate Sparkle Appcast
        env:
          SPARKLE_EDDSA_PRIVATE_KEY: ${{ secrets.SPARKLE_EDDSA_PRIVATE_KEY }}
        run: |
          mkdir -p Sparkle-Bin
          curl -sL https://github.com/sparkle-project/Sparkle/releases/download/2.6.4/Sparkle-2.6.4.tar.xz | tar -xJ -C Sparkle-Bin
          echo "$SPARKLE_EDDSA_PRIVATE_KEY" | ./Sparkle-Bin/bin/generate_appcast --ed-key-file - dist/

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          overwrite_files: true
          generate_release_notes: true
          body: |
            Download the DMG file to install Maa on your Mac. You can also download the zip if preferred.
            
            Note: this package is unsigned by default, so macOS Gatekeeper may require opening once via right-click -> Open.
